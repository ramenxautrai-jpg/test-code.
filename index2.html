<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chatbot Groq</title>
  <style> 
    /* CSS (giao diện dark/light, layout, .chat-user, .chat-ai, .toast, ...) */
  </style>
</head>
<body>
  <div id="app">
    <div id="header"> 
      <span id="status">🔴 Chưa kết nối</span>
      <button id="settingsBtn">⚙️</button>
      <!-- Các nút khác: New Chat, Clear History, Export, v.v. -->
    </div>
    <div id="sidebar">
      <!-- Danh sách Chat cũ -->
    </div>
    <div id="mainChat">
      <div id="chatContainer"></div>
      <div id="inputContainer">
        <textarea id="inputMsg" placeholder="Nhập tin nhắn..."></textarea>
        <button id="sendBtn">Gửi</button>
      </div>
    </div>
    <div id="apiKeyDialog" class="modal">
      <p>Nhập API Key Groq:</p>
      <input type="text" id="apiKeyInput" placeholder="gsk_xxx">
      <button id="apiKeySave">Lưu Key</button>
    </div>
    <!-- Dialog cài đặt (Model, Temp, max_tokens), lịch sử chat -->
  </div>

<script>
const API_URL = "https://api.groq.com/openai/v1/chat/completions";
let groqApiKey = "";
let selectedModel = "llama-3.1-8b-instant"; // mặc định
let temperature = 0.7;
let maxTokens = 1024;
let chatHistory = [];

// Tải API key từ localStorage và thử kết nối
function loadApiKey() {
  const key = localStorage.getItem("groq_api_key");
  if (key) {
    groqApiKey = key;
    checkConnection();
  } else {
    document.getElementById("apiKeyDialog").style.display = "block";
  }
}

// Lưu key và kiểm tra
document.getElementById("apiKeySave").onclick = () => {
  const key = document.getElementById("apiKeyInput").value.trim();
  if (!key) return alert("Vui lòng nhập API Key!");
  localStorage.setItem("groq_api_key", key);
  groqApiKey = key;
  document.getElementById("apiKeyDialog").style.display = "none";
  checkConnection();
};

// Kiểm tra kết nối (gửi một tin test)
async function checkConnection() {
  try {
    const resp = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json","Authorization": "Bearer " + groqApiKey},
      body: JSON.stringify({
        model: selectedModel,
        messages: [{role:"user", content: "Kiểm tra kết nối"}],
        max_tokens: 1
      })
    });
    if (!resp.ok) {
      const err = await resp.text();
      console.error("Lỗi API:", err);
      alert("Lỗi API Key: " + err);
      return;
    }
    document.getElementById("status").textContent = "🟢 Đã kết nối";
    showToast(`🟢 Đã kết nối Groq thành công (Model: ${selectedModel})`);
  } catch (e) {
    console.error(e);
    alert("Không thể kết nối Groq: " + e);
  }
}

// Thêm message của người dùng vào giao diện
function addUserMessage(text) {
  const div = document.createElement("div");
  div.className = "chat chat-user";
  div.innerText = text;
  document.getElementById("chatContainer").appendChild(div);
  chatHistory.push({role:"user", content:text});
  autoScroll();
}

// Thêm hoặc cập nhật message AI vào giao diện
function addAIBubble(initialText = "") {
  const div = document.createElement("div");
  div.className = "chat chat-ai";
  div.id = "aiBubble";
  div.innerText = initialText;
  document.getElementById("chatContainer").appendChild(div);
  autoScroll();
}

// Cập nhật nội dung tin nhắn AI đang gõ
function updateAIBubble(text) {
  const div = document.getElementById("aiBubble");
  if (div) div.innerText = text;
  autoScroll();
}

// Hiển thị thông báo toast
function showToast(message) {
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.innerText = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

// Xử lý lỗi: hiển thị trong bubble AI (đỏ)
function showErrorBubble(err) {
  const div = document.createElement("div");
  div.className = "chat chat-error";
  div.innerText = "Lỗi: " + err;
  document.getElementById("chatContainer").appendChild(div);
  autoScroll();
}

// Cuộn xuống cuối
function autoScroll() {
  const container = document.getElementById("chatContainer");
  container.scrollTop = container.scrollHeight;
}

// Gửi và nhận tin nhắn
document.getElementById("sendBtn").onclick = () => {
  const msg = document.getElementById("inputMsg").value.trim();
  if (!msg) return;
  addUserMessage(msg);
  document.getElementById("inputMsg").value = "";
  // Tạo bubble AI tạm thời
  addAIBubble("...đang trả lời");
  // Gọi API Groq
  callGroqAPI(msg);
};

// Gọi Groq Chat Completion (streaming)
async function callGroqAPI(userMessage) {
  try {
    const resp = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json","Authorization": "Bearer " + groqApiKey},
      body: JSON.stringify({
        model: selectedModel,
        messages: [{role:"user", content: userMessage}],
        temperature: temperature,
        max_tokens: maxTokens,
        stream: true
      })
    });
    if (!resp.ok) {
      const errorJson = await resp.text();
      console.error("API Error:", errorJson);
      showErrorBubble(errorJson);
      return;
    }
    // Đọc stream SSE
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let aiResponse = "";
    while(true) {
      const { value, done } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      // Tách mỗi bản tin SSE (phân cách bởi "\n\n")
      const events = chunk.split("\n\n");
      for (let evt of events) {
        if (evt.startsWith("data: ")) {
          const dataStr = evt.slice(6).trim();
          
          // Bỏ qua tín hiệu kết thúc stream để không bị lỗi JSON.parse
          if (dataStr === "[DONE]") continue;

          try {
            const jsonData = JSON.parse(dataStr);
            // Lấy token delta
            const token = jsonData.choices[0]?.delta?.content;
            if (token) {
              aiResponse += token;
              updateAIBubble(aiResponse);
            }
          } catch (e) {
            console.error("Lỗi phân tích JSON:", e, dataStr);
          }
        }
      }
    }
    chatHistory.push({role:"ai", content: aiResponse});
    // highlight Markdown/code, thêm nút copy ở đây...
  } catch (err) {
    console.error("Fetch error:", err);
    showErrorBubble(err.message || err);
  }
}

// Khởi chạy
window.onload = () => {
  loadApiKey();
  // Tải lịch sử trước (nếu cần)
};
</script>
</body>
</html>
